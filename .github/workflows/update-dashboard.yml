name: Update dashboard and deploy

on:
  schedule:
    # Daily at 13:30 UTC (~ 08:30 US Central / 06:30 US Pacific)
    - cron: "30 13 * * *"
  workflow_dispatch: {}
  push:
    branches: [main]

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages-deploy
  cancel-in-progress: false

jobs:
  refresh-feed:
    name: Refresh lease feed JSON
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.diff.outputs.changed }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Run feed updater (never fails the build)
        run: |
          set +e
          python scripts/update_gv70_lease_feed.py
          echo "updater exit: $?"
          exit 0

      - name: Detect whether the feed changed
        id: diff
        run: |
          if git diff --quiet -- feed/gv70_lease_feed.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No feed changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Feed changes detected."
          fi

      - name: Commit refreshed feed
        if: steps.diff.outputs.changed == 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add feed/gv70_lease_feed.json
          git commit -m "chore(feed): daily refresh $(date -u +'%Y-%m-%d')"
          git push

  deploy:
    name: Deploy to GitHub Pages
    needs: refresh-feed
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Check out the latest commit (after potential feed update)
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1

      - name: Ensure Jekyll is disabled
        run: touch .nojekyll

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload site artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
